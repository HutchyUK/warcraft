services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: warcraft
      POSTGRES_USER: warcraft
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U warcraft -d warcraft" ]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432" # expose for local inspection; remove in prod

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: Host=ep-calm-feather-ab5l9bc1.eu-west-2.aws.neon.tech;Database=neondb;Username=neondb_owner;Password=npg_iP56ZKptUuLH;SSL Mode=Require
      Blizzard__ClientId: 2c73def139ce4e04a19cee6229f83370
      Blizzard__ClientSecret: MDlWIwfKwzXFPK4p5dcCm4HurxsgOGMU
      Blizzard__RedirectUri: https://warcraft.railway.app/api/auth/callback
      FrontendUrl: https://warcraft-pi.vercel.app
      Cors__AllowedOrigins__0: https://warcraft-pi.vercel.app
      ASPNETCORE_ENVIRONMENT: Production
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres_data:
