services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: warcraft
      POSTGRES_USER: warcraft
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warcraft -d warcraft"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"   # expose for local inspection; remove in prod

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: >-
        Host=db;Port=5432;Database=warcraft;Username=warcraft;Password=${POSTGRES_PASSWORD}
      Blizzard__ClientId: ${BLIZZARD_CLIENT_ID:?BLIZZARD_CLIENT_ID is required}
      Blizzard__ClientSecret: ${BLIZZARD_CLIENT_SECRET:?BLIZZARD_CLIENT_SECRET is required}
      Blizzard__RedirectUri: ${BLIZZARD_REDIRECT_URI:-http://localhost:8080/api/auth/callback}
      FrontendUrl: ${FRONTEND_URL:-http://localhost:3000}
      Cors__AllowedOrigins__0: ${FRONTEND_URL:-http://localhost:3000}
      ASPNETCORE_ENVIRONMENT: Production
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres_data:
